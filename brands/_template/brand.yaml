# brand.yaml — Template for a SaaS brand configuration
# 
# To add a new brand:
#   1. Copy this folder: cp -r brands/_template brands/your-brand-name
#   2. Edit brand.yaml with your brand's details
#   3. Run the scanner: python scripts/run_scan.py your-brand-name --url https://app.yourbrand.com
#
# For folder-based scanning:
#   Place the brand's source code in brands/your-brand-name/src/ or
#   point target_dir to the absolute path.

name: "Your Brand Name"

# Target URL for live scanning (HTTP headers, SSL, etc.)
target_url: "https://app.yourbrand.com"

# Optional: path to source code for static analysis
# target_dir: "brands/your-brand-name/src"
target_dir: ""

# Severity threshold: critical, high, medium, low, info
severity_threshold: "low"

# Scanner timeout in seconds
timeout_seconds: 300

# Categories to scan (empty or absent = all)
enabled_categories:
  - dependencies
  - configuration
  - authentication
  - cors_headers
  - secrets
  - ssl_tls

# Environment variables this brand needs
env_vars:
  DATABASE_URL: ""
  SECRET_KEY: ""
  API_KEY: ""

# Additional brand-specific custom checks
custom_checks:
  enabled: false
  # Define custom check scripts in brands/your-brand-name/checks/
