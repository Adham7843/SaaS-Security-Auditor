# brand.yaml — Template for a SaaS brand configuration
#
# To add a new brand:
#   1. Copy this folder: cp -r brands/_template brands/your-brand
#   2. Edit brand.yaml with your brand's details
#   3. Run: python scripts/init_brand.py brands/your-brand
#      This will auto-deploy the spec-designer agent for this brand
#   4. Run the scanner: python scripts/run_scan.py your-brand --url https://app.yourbrand.com

name: "Your Brand Name"

# Target URL for live scanning (HTTP headers, SSL, etc.)
target_url: "https://app.yourbrand.com"

# Directory name (auto-detected from folder)
dir: ""

# Optional: path to source code for static analysis
target_dir: ""

# Severity threshold: critical, high, medium, low, info
severity_threshold: "low"

# Scanner timeout in seconds
timeout_seconds: 300

# Categories to scan (empty or absent = all)
enabled_categories:
  - dependencies
  - configuration
  - authentication
  - cors_headers
  - secrets
  - ssl_tls

# Environment variables this brand needs
env_vars:
  DATABASE_URL: ""
  SECRET_KEY: ""
  API_KEY: ""

# Additional brand-specific custom checks
custom_checks:
  enabled: false

# ---- AUTO-DEPLOYED AGENTS ----
# These agents are deployed automatically when init_brand.py runs:
agents:
  spec-designer:
    enabled: true
    description: "Security spec designer for this brand"
